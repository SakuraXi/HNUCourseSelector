name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir -w --clean --collect-all selenium --add-data "ddddocr;ddddocr" --name "HNUCourseSelector" GUI.py

      - name: Prepare Package
        run: |
          Compress-Archive -Path "dist/HNUCourseSelector/*" -DestinationPath "dist/HNUCourseSelector_Windows.zip"

      - name: Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/HNUCourseSelector_Windows.zip
          body: |
            ## 更新日志
            - 全新 GUI 界面
            - 支持预选 HTML 导入
            - 支持预设时间自动开始
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}